<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ashforge Admin</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0b0f;
      --bg2: #110e14;
      --bg3: #16121b;
      --surface: #1e1824;
      --surface2: #251f2e;
      --surface3: #2d273a;
      --border: #2e2638;
      --border-bright: #3d3450;
      --ember: oklch(68% 0.19 42);
      --ember-dim: oklch(50% 0.14 42);
      --ember-glow: oklch(72% 0.22 38);
      --gold: oklch(76% 0.14 78);
      --gold-dim: oklch(58% 0.10 78);
      --green: oklch(65% 0.18 150);
      --green-dim: oklch(45% 0.12 150);
      --red: oklch(58% 0.20 20);
      --red-dim: oklch(42% 0.14 20);
      --text: oklch(90% 0.01 80);
      --text-dim: oklch(65% 0.02 80);
      --text-faint: oklch(45% 0.02 80);
      --font-head: 'Cinzel', Georgia, serif;
      --font-body: 'Crimson Pro', Georgia, serif;
      --font-mono: 'Courier New', monospace;
      --sidebar-w: 240px;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

    /* ── LOGIN SCREEN ── */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
    }

    .login-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 60%, oklch(40% 0.14 42 / 0.08) 0%, transparent 60%),
        linear-gradient(to bottom, var(--bg) 0%, var(--bg2) 100%);
      pointer-events: none;
    }

    .login-card {
      position: relative;
      z-index: 2;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 48px 52px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 60px oklch(40% 0.14 42 / 0.06);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .login-logo img { height: 40px; width: auto; }

    .login-eyebrow {
      font-family: var(--font-head);
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--ember);
      margin-bottom: 32px;
    }

    .login-title {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    .login-sub {
      font-size: 14px;
      color: var(--text-faint);
      margin-bottom: 32px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }

    .field label {
      font-family: var(--font-head);
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .field input, .field textarea, .field select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 11px 14px;
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--text);
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    .field input::placeholder, .field textarea::placeholder { color: var(--text-faint); }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--ember-dim); }
    .field textarea { resize: vertical; min-height: 80px; }
    .field select { appearance: none; cursor: pointer; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-head);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s, transform 0.15s;
      padding: 11px 22px;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--ember);
      color: #0d0b0f;
    }
    .btn-primary:hover {
      background: var(--ember-glow);
      box-shadow: 0 0 24px oklch(68% 0.19 42 / 0.4);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border-bright);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid var(--red-dim);
    }
    .btn-danger:hover { background: var(--red); color: #0d0b0f; }

    .btn-success {
      background: var(--green);
      color: #0d0b0f;
    }
    .btn-success:hover { background: oklch(70% 0.20 150); }

    .btn-sm { padding: 7px 14px; font-size: 9px; }
    .btn-full { width: 100%; }

    .login-error {
      background: oklch(42% 0.14 20 / 0.15);
      border: 1px solid var(--red-dim);
      border-radius: 2px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 16px;
    }

    /* ── ADMIN SHELL ── */
    .admin-shell {
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .admin-sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 50;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo img { height: 36px; width: auto; }

    .sidebar-eyebrow {
      font-family: var(--font-head);
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--ember-dim);
      margin-top: 6px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 20px 0;
    }

    .sidebar-section-label {
      font-family: var(--font-head);
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-faint);
      padding: 0 20px;
      margin: 16px 0 8px;
    }

    .sidebar-nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      font-family: var(--font-head);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      border-left: 2px solid transparent;
      user-select: none;
    }
    .sidebar-nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .sidebar-nav-item.active {
      color: var(--ember);
      background: oklch(68% 0.19 42 / 0.07);
      border-left-color: var(--ember);
    }
    .sidebar-nav-item svg { flex-shrink: 0; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }

    .sidebar-user {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .sidebar-user-avatar {
      width: 30px;
      height: 30px;
      background: oklch(68% 0.19 42 / 0.2);
      border: 1px solid var(--ember-dim);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-size: 10px;
      color: var(--ember);
      flex-shrink: 0;
    }

    .sidebar-user-info {
      flex: 1;
      min-width: 0;
    }

    .sidebar-user-name {
      font-family: var(--font-head);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-user-role {
      font-size: 11px;
      color: var(--text-faint);
    }

    /* ── MAIN CONTENT ── */
    .admin-main {
      flex: 1;
      margin-left: var(--sidebar-w);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .admin-topbar {
      height: 58px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 36px;
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .topbar-title {
      font-family: var(--font-head);
      font-size: 13px;
      letter-spacing: 0.1em;
      color: var(--text);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-preview-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-head);
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-faint);
      text-decoration: none;
      transition: color 0.2s;
    }
    .topbar-preview-link:hover { color: var(--ember); }

    /* ── PANEL PAGES ── */
    .admin-panel {
      flex: 1;
      padding: 40px 36px;
      max-width: 1000px;
    }

    .panel-header {
      margin-bottom: 36px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .panel-eyebrow {
      font-family: var(--font-head);
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--ember);
      margin-bottom: 8px;
    }

    .panel-title {
      font-family: var(--font-head);
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .panel-sub {
      font-size: 14px;
      color: var(--text-faint);
      margin-top: 6px;
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 28px 30px;
      margin-bottom: 24px;
    }

    .card-title {
      font-family: var(--font-head);
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── FORM GRID ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-grid .field-full { grid-column: 1 / -1; }

    /* ── BLOG LIST ── */
    .post-list-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 18px 22px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: border-color 0.2s;
    }

    .post-list-item:hover { border-color: var(--border-bright); }

    .post-list-item.editing { border-color: var(--ember-dim); background: oklch(68% 0.19 42 / 0.04); }

    .post-list-meta {
      flex: 1;
      min-width: 0;
    }

    .post-list-tag {
      display: inline-block;
      font-family: var(--font-head);
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 1px;
      margin-bottom: 6px;
    }

    .tag-announcement { background: var(--ember); color: #0d0b0f; }
    .tag-lore { background: oklch(50% 0.16 260); color: #fff; }
    .tag-design { background: oklch(48% 0.16 200); color: #fff; }
    .tag-news { background: var(--gold-dim); color: #0d0b0f; }
    .tag-process { background: oklch(45% 0.14 320); color: #fff; }

    .post-list-title {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.03em;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .post-list-info {
      font-size: 12px;
      color: var(--text-faint);
    }

    .post-list-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── EDIT FORM (inline) ── */
    .inline-edit {
      background: var(--bg3);
      border: 1px solid var(--ember-dim);
      border-radius: 2px;
      padding: 24px 24px;
      margin-bottom: 12px;
    }

    .inline-edit-title {
      font-family: var(--font-head);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ember);
      margin-bottom: 18px;
    }

    /* ── PAGES ── */
    .page-list-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 18px 22px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.2s;
    }

    .page-list-item:hover { border-color: var(--border-bright); }

    .page-list-icon {
      width: 36px;
      height: 36px;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-faint);
      flex-shrink: 0;
    }

    .page-list-meta { flex: 1; min-width: 0; }

    .page-list-name {
      font-family: var(--font-head);
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--text);
      margin-bottom: 2px;
    }

    .page-list-url {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-faint);
    }

    .page-badge {
      font-family: var(--font-head);
      font-size: 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 1px;
      flex-shrink: 0;
    }

    .badge-live { background: oklch(65% 0.18 150 / 0.15); color: var(--green); border: 1px solid var(--green-dim); }
    .badge-draft { background: oklch(45% 0.02 80 / 0.1); color: var(--text-faint); border: 1px solid var(--border); }

    /* ── STAT CARDS ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 20px 22px;
    }

    .stat-card-label {
      font-family: var(--font-head);
      font-size: 8px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 8px;
    }

    .stat-card-value {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 700;
      color: var(--ember);
      line-height: 1;
    }

    .stat-card-sub {
      font-size: 12px;
      color: var(--text-faint);
      margin-top: 4px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--ember-dim);
      border-radius: 3px;
      padding: 12px 20px;
      font-family: var(--font-head);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--ember);
      z-index: 999;
      transform: translateY(80px);
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--green-dim); color: var(--green); }
    .toast.error { border-color: var(--red-dim); color: var(--red); }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* ── RICH TEXT HINT ── */
    .field-hint {
      font-size: 12px;
      color: var(--text-faint);
      margin-top: 4px;
    }

    /* ── SUPPLEMENT CARD IN ADMIN ── */
    .supplement-admin-card {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 20px;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 16px 20px;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .supplement-admin-card:hover { border-color: var(--border-bright); }

    .supplement-thumb {
      width: 80px;
      height: 106px;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 1px;
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--text-faint);
      font-family: var(--font-mono);
      overflow: hidden;
    }

    .supplement-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(13,11,15,0.85);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .confirm-box {
      background: var(--surface);
      border: 1px solid var(--border-bright);
      border-radius: 4px;
      padding: 36px 40px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }

    .confirm-box h3 {
      font-family: var(--font-head);
      font-size: 16px;
      color: var(--text);
      margin-bottom: 10px;
    }

    .confirm-box p {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .confirm-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    /* ── UNSAVED BADGE ── */
    .unsaved-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ember);
      margin-left: 6px;
      vertical-align: middle;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    /* scrollable rich body */
    .rich-body-field {
      min-height: 180px;
    }

    /* nav-page select row */
    .new-page-type-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .page-type-btn {
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--surface2);
      padding: 16px 14px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .page-type-btn:hover { border-color: var(--border-bright); background: var(--surface3); }
    .page-type-btn.selected { border-color: var(--ember-dim); background: oklch(68% 0.19 42 / 0.07); }

    .page-type-icon {
      width: 32px;
      height: 32px;
      margin: 0 auto 8px;
      color: var(--text-faint);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .page-type-btn.selected .page-type-icon { color: var(--ember); }

    .page-type-label {
      font-family: var(--font-head);
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .page-type-btn.selected .page-type-label { color: var(--ember); }

    /* About image uploader placeholder */
    .image-uploader {
      border: 1px dashed var(--border-bright);
      border-radius: 2px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--bg);
    }

function useToast() {
  const [toast, setToast] = useState({ msg: '', type: '', show: false });
  const timerRef = useRef(null);

  const show = useCallback((msg, type = 'default') => {
    if (timerRef.current) clearTimeout(timerRef.current);
    setToast({ msg, type, show: true });
    timerRef.current = setTimeout(() => setToast(t => ({ ...t, show: false })), 2800);
  }, []);

  return { toast, show };
}

function Toast({ toast }) {
  return (
    <div className={`toast ${toast.show ? 'show' : ''} ${toast.type}`}>
      {toast.msg}
    </div>
  );
}

function BlogManager({ data, onChange, showToast }) {
  const [posts, setPosts] = useState(data.posts);
  const [editingId, setEditingId] = useState(null);
  const [editDraft, setEditDraft] = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [newPost, setNewPost] = useState(null);
  const [confirm, setConfirm] = useState(null);

  function startEdit(post) {
    setEditingId(post.id);
    setEditDraft({ ...post });
    setShowNew(false);
  }

  function cancelEdit() { setEditingId(null); setEditDraft(null); }

  function saveEdit() {
    const updated = posts.map(p => p.id === editingId ? { ...editDraft } : p);
    setPosts(updated);
    onChange({ posts: updated });
    setEditingId(null);
    setEditDraft(null);
    showToast('Post updated ✦', 'success');
  }

  function confirmDelete(id) {
    setConfirm({ id, msg: 'This will permanently delete this blog post.' });
  }

  function doDelete() {
    const updated = posts.filter(p => p.id !== confirm.id);
    setPosts(updated);
    onChange({ posts: updated });
    setConfirm(null);
    showToast('Post deleted', 'default');

    setShowNew(false);

function ExportPanel({ data, onReplace, showToast }) {
  const [copied, setCopied] = useState(false);
  const [importing, setImporting] = useState(false);
  const fileInputRef = React.useRef(null);

  function downloadContentJson() {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'content.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('content.json downloaded \u2726', 'success');
  }

  function copyJson() {
    const json = JSON.stringify(data, null, 2);
    navigator.clipboard.writeText(json).then(() => {
      setCopied(true);
      showToast('JSON copied to clipboard', 'success');
      setTimeout(() => setCopied(false), 2000);
    });
  }

  function pickFile() {
    fileInputRef.current && fileInputRef.current.click();
  }

  function onFileChosen(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file) return;
    setImporting(true);
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed || typeof parsed !== 'object') throw new Error('Not an object');
        if (!confirm('Replace all current admin data with the contents of this file? This will overwrite your local edits.')) {
          setImporting(false);
          return;
        }
        onReplace(parsed);
        showToast('content.json imported \u2726', 'success');
      } catch (err) {
        showToast('Invalid JSON file', 'error');
      } finally {
        setImporting(false);
      }
    };
    reader.onerror = () => { setImporting(false); showToast('Could not read file', 'error'); };
    reader.readAsText(file);
  }

  async function loadLiveContent() {
    try {
      const res = await fetch('content.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const parsed = await res.json();
      if (!confirm('Load the current live content.json from this folder? This will overwrite your local edits.')) return;
      onReplace(parsed);
      showToast('Loaded live content.json', 'success');
    } catch (err) {
      showToast('No content.json found next to admin.html', 'error');
    }
  }

  return (
    <div className="admin-panel">
      <div className="panel-header">
        <div className="panel-eyebrow">Publish</div>
        <div className="panel-title">Publish to Site</div>
        <div className="panel-sub">Download an updated <code style={{ fontFamily: 'var(--font-mono)', background: 'var(--surface3)', padding: '2px 6px', borderRadius: 2, fontSize: 12 }}>content.json</code>, replace the one in your repo, and redeploy.</div>
      </div>

      <div className="card" style={{ borderColor: 'var(--ember)', background: 'oklch(68% 0.19 42 / 0.06)' }}>
        <div className="card-title">1. Download updated content.json</div>
        <p style={{ fontSize: 14, color: 'var(--text-dim)', marginBottom: 16, lineHeight: 1.6 }}>
          Bundles every edit you’ve made (site info, services, supplements, blog posts, and pages) into a single <code style={{ fontFamily: 'var(--font-mono)', background: 'var(--surface3)', padding: '1px 5px', borderRadius: 2, fontSize: 12 }}>content.json</code>. Drop the downloaded file into your site’s project root (overwriting the existing one) and push to your host.
        </p>
        <button className="btn btn-primary btn-sm" onClick={downloadContentJson}>
          {Icon.save} Download content.json
        </button>
      </div>

      <div className="card">
        <div className="card-title">2. Import an existing content.json</div>
        <p style={{ fontSize: 14, color: 'var(--text-dim)', marginBottom: 16, lineHeight: 1.6 }}>
          Replace the admin’s local data with a <code style={{ fontFamily: 'var(--font-mono)', background: 'var(--surface3)', padding: '1px 5px', borderRadius: 2, fontSize: 12 }}>content.json</code> file from disk — useful when picking up edits on a new browser, syncing between machines, or rolling back to a previous version.
        </p>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
          <button className="btn btn-ghost btn-sm" onClick={pickFile} disabled={importing}>
            {Icon.upload || Icon.save} {importing ? 'Importing…' : 'Choose content.json…'}
          </button>
          <button className="btn btn-ghost btn-sm" onClick={loadLiveContent}>
            {Icon.link} Load live content.json
          </button>
        </div>
        <input ref={fileInputRef} type="file" accept="application/json,.json" onChange={onFileChosen} style={{ display: 'none' }} />
      </div>

      <div className="card">
        <div className="card-title">Backup: copy JSON to clipboard</div>
        <p style={{ fontSize: 14, color: 'var(--text-dim)', marginBottom: 16, lineHeight: 1.6 }}>
          For ad-hoc backups or pasting into a Git commit message / scratch file.
        </p>
        <button className="btn btn-ghost btn-sm" onClick={copyJson}>
          {copied ? Icon.check : Icon.save} {copied ? 'Copied!' : 'Copy JSON Data'}
        </button>
      </div>

      <div className="card" style={{ borderColor: 'var(--ember-dim)', background: 'oklch(68% 0.19 42 / 0.04)' }}>
        <div className="card-title">Workflow</div>
        <ol style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 2, paddingLeft: 20 }}>
          <li>Run the admin locally (<code style={{ fontFamily: 'var(--font-mono)', fontSize: 12, background: 'var(--surface3)', padding: '1px 5px', borderRadius: 2 }}>admin.html</code> should NOT be deployed publicly).</li>
          <li>Edit content here — it lives in this browser’s localStorage.</li>
          <li>Click <strong>Download content.json</strong>, replace the file at the project root.</li>
          <li>Commit and push. Netlify / Pages auto-rebuild and the public site picks up the new content.</li>
          <li>To keep editing on a different machine, copy <code style={{ fontFamily: 'var(--font-mono)', fontSize: 12, background: 'var(--surface3)', padding: '1px 5px', borderRadius: 2 }}>content.json</code> over and click <strong>Choose content.json…</strong>.</li>
        </ol>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
// SECURITY (CHANGE PASSWORD)
// ═══════════════════════════════════════

function SecurityPanel({ showToast }) {
  const [current, setCurrent] = useState('');
  const [next, setNext] = useState('');
  const [confirmPw, setConfirmPw] = useState('');
  const isDefault = getAdminPassword() === DEFAULT_ADMIN_PASSWORD;

  function handleChange(e) {
    e.preventDefault();
    if (current !== getAdminPassword()) { showToast('Current password is incorrect', 'error'); return; }
    if (next.length < 6) { showToast('New password must be at least 6 characters', 'error'); return; }
    if (next !== confirmPw) { showToast('New passwords do not match', 'error'); return; }
    setAdminPassword(next);
    setCurrent(''); setNext(''); setConfirmPw('');
    showToast('Password updated \u2726', 'success');
  }

  return (
    <div className="admin-panel">
      <div className="panel-header">
        <div className="panel-eyebrow">Account</div>
        <div className="panel-title">Security</div>
        <div className="panel-sub">Change the password used to access this admin panel. Stored locally in this browser.</div>
      </div>

      {isDefault && (
        <div className="card" style={{ borderColor: 'var(--gold-dim)', background: 'oklch(76% 0.14 78 / 0.05)' }}>
          <div className="card-title" style={{ color: 'var(--gold)' }}>Default password in use</div>
          <p style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.6 }}>
            You're still using the default password. Set a new one below.
          </p>
        </div>
      )}

      <div className="card">
        <div className="card-title">Change Password</div>
        <form onSubmit={handleChange}>
          <div className="form-grid">
            <div className="field field-full">
              <label>Current Password</label>
              <input type="password" value={current} onChange={e => setCurrent(e.target.value)} placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022" autoComplete="current-password" />
            </div>
            <div className="field">
              <label>New Password</label>
              <input type="password" value={next} onChange={e => setNext(e.target.value)} placeholder="At least 6 characters" autoComplete="new-password" />
            </div>
            <div className="field">
              <label>Confirm New Password</label>
              <input type="password" value={confirmPw} onChange={e => setConfirmPw(e.target.value)} placeholder="Repeat new password" autoComplete="new-password" />
            </div>
          </div>
          <div style={{ display: 'flex', gap: 10, marginTop: 18 }}>
            <button type="submit" className="btn btn-primary btn-sm">{Icon.save} Update Password</button>
          </div>
        </form>
      </div>

      <div className="card" style={{ borderColor: 'var(--ember-dim)', background: 'oklch(68% 0.19 42 / 0.04)' }}>
        <div className="card-title">Notes</div>
        <ul style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 2, paddingLeft: 20 }}>
          <li>The password is stored in this browser's localStorage. Clearing site data will reset it to the default.</li>
          <li>This is a client-side gate \u2014 it deters casual access but is not a substitute for server-side authentication on a hosted site.</li>
          <li>If you forget your password, clear localStorage for this site to reset it to the default.</li>
        </ul>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
// APP SHELL
// ═══════════════════════════════════════

const NAV_ITEMS = [
  { id: 'dashboard', label: 'Dashboard', icon: Icon.home, group: 'main' },
  { id: 'siteinfo', label: 'Site Info', icon: Icon.settings, group: 'content' },
  { id: 'blog', label: 'Blog Posts', icon: Icon.post, group: 'content' },
  { id: 'supplements', label: 'Supplements', icon: Icon.book, group: 'content' },
  { id: 'pages', label: 'Pages', icon: Icon.page, group: 'content' },
  { id: 'security', label: 'Security', icon: Icon.settings, group: 'account' },
  { id: 'export', label: 'Publish', icon: Icon.link, group: 'publish' },
];

function AdminApp() {
  const [authed, setAuthed] = useState(() => sessionStorage.getItem('ashforge_admin_authed') === '1');
  const [activePanel, setActivePanel] = useState('dashboard');
  const [data, setData] = useState(loadData);
  const { toast, show: showToast } = useToast();

  function handleLogin() {
    sessionStorage.setItem('ashforge_admin_authed', '1');
    setAuthed(true);
  }

  function handleLogout() {
    sessionStorage.removeItem('ashforge_admin_authed');
    setAuthed(false);
  }

  function handleChange(partial) {
    setData(prev => {
      const next = { ...prev, ...partial };
      saveData(next);
      return next;
    });
  }

  function handleReplace(nextData) {
    const merged = { ...DEFAULT_DATA, ...nextData };
    saveData(merged);
    setData(merged);
  }

  if (!authed) return <LoginScreen onLogin={handleLogin} />;

  const panelLabel = NAV_ITEMS.find(n => n.id === activePanel)?.label || '';

  return (
    <div className="admin-shell">
      {/* SIDEBAR */}
      <aside className="admin-sidebar">
        <div className="sidebar-header">
          <div className="sidebar-logo">
            <img src="uploads/logo.png" alt="Ashforge Studio" />
          </div>
          <div className="sidebar-eyebrow">Admin Panel</div>
        </div>

        <nav className="sidebar-nav">
          <div className="sidebar-section-label">Main</div>
          {NAV_ITEMS.filter(n => n.group === 'main').map(item => (
            <div
              key={item.id}
              className={`sidebar-nav-item ${activePanel === item.id ? 'active' : ''}`}
              onClick={() => setActivePanel(item.id)}
            >
              {item.icon}
              {item.label}
            </div>
          ))}

          <div className="sidebar-section-label" style={{ marginTop: 20 }}>Content</div>
          {NAV_ITEMS.filter(n => n.group === 'content').map(item => (
            <div
              key={item.id}
              className={`sidebar-nav-item ${activePanel === item.id ? 'active' : ''}`}
              onClick={() => setActivePanel(item.id)}
            >
              {item.icon}
              {item.label}
            </div>
          ))}

          <div className="sidebar-section-label" style={{ marginTop: 20 }}>Account</div>
          {NAV_ITEMS.filter(n => n.group === 'account').map(item => (
            <div
              key={item.id}
              className={`sidebar-nav-item ${activePanel === item.id ? 'active' : ''}`}
              onClick={() => setActivePanel(item.id)}
            >
              {item.icon}
              {item.label}
            </div>
          ))}

          <div className="sidebar-section-label" style={{ marginTop: 20 }}>Publish</div>
          {NAV_ITEMS.filter(n => n.group === 'publish').map(item => (
            <div
              key={item.id}
              className={`sidebar-nav-item ${activePanel === item.id ? 'active' : ''}`}
              onClick={() => setActivePanel(item.id)}
            >
              {item.icon}
              {item.label}
            </div>
          ))}
        </nav>

        <div className="sidebar-footer">
          <div className="sidebar-user">
            <div className="sidebar-user-avatar">M</div>
            <div className="sidebar-user-info">
              <div className="sidebar-user-name">Matthias Moore</div>
              <div className="sidebar-user-role">Studio Admin</div>
            </div>
          </div>
          <button className="btn btn-ghost btn-sm btn-full" onClick={handleLogout} style={{ gap: 8 }}>
            {Icon.logout} Log Out
          </button>
        </div>
      </aside>

      {/* MAIN */}
      <div className="admin-main">
        <div className="admin-topbar">
          <div className="topbar-title">{panelLabel}</div>
          <div className="topbar-right">
            <a href="index.html" target="_blank" rel="noopener" className="topbar-preview-link">
              {Icon.eye} View Site
            </a>
            <a href="blog.html" target="_blank" rel="noopener" className="topbar-preview-link">
              {Icon.eye} View Blog
            </a>
          </div>
        </div>

        {activePanel === 'dashboard' && <Dashboard data={data} />}
        {activePanel === 'siteinfo' && <SiteInfoEditor data={data} onChange={handleChange} showToast={showToast} />}
        {activePanel === 'blog' && <BlogManager data={data} onChange={handleChange} showToast={showToast} />}
        {activePanel === 'portfolio' && <PortfolioManager data={data} onChange={handleChange} showToast={showToast} />}
        {activePanel === 'supplements' && <SupplementsManager data={data} onChange={handleChange} showToast={showToast} />}
        {activePanel === 'pages' && <PagesManager data={data} onChange={handleChange} showToast={showToast} />}
        {activePanel === 'security' && <SecurityPanel showToast={showToast} />}
        {activePanel === 'export' && <ExportPanel data={data} onReplace={handleReplace} showToast={showToast} />}
      </div>

      <Toast toast={toast} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AdminApp />);
</script>
</body>
</html>
